name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Explicit --legacy-peer-deps because vite-plugin-pwa@1.2.0 declares a
      # Vite ^3–^7 peer range and we're on Vite 8. (We also have it in .npmrc
      # but `npm ci`'s lockfile-validation pass reads CLI flags more reliably.)
      - run: npm ci --legacy-peer-deps

      # VITE_BASE must match the repo name so asset URLs resolve at /<repo>/.
      # Pages serves repo content at https://<user>.github.io/<repo>/, so the base
      # has to be `/<repo>/` with leading + trailing slash.
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
