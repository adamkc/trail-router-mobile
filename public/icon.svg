<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Blaze background (matches --blaze token). Rounded for non-maskable; maskable variants crop to circle. -->
  <rect width="512" height="512" rx="80" fill="oklch(0.72 0.17 55)"/>
  <!-- Topo ridges — three faint contour lines -->
  <g fill="none" stroke="#1A1208" stroke-width="4" opacity="0.18">
    <path d="M 40 300 Q 130 240 220 280 T 472 260"/>
    <path d="M 40 340 Q 130 280 220 320 T 472 300"/>
    <path d="M 40 380 Q 130 320 220 360 T 472 340"/>
  </g>
  <!-- Trail glyph (README: M3 19 L8 12 L12 16 L16 8 L21 19 Z) scaled to 512 from 24 viewBox -->
  <path
    d="M 64 405 L 170 256 L 256 342 L 341 170 L 448 405 Z"
    fill="none"
    stroke="#1A1208"
    stroke-width="22"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Small blaze accent dot at peak -->
  <circle cx="341" cy="170" r="14" fill="#1A1208"/>
</svg>
